# model-policy.toml — single source of truth for "which model, how much effort".
#
# Copy this file to `.codex-delegate.local/model-policy.toml` in your repo and
# edit the copy — the shipped template is the fallback used when no local
# override exists.
#
# Per-class policy (GPT-5.6 line): the task class selects BOTH a model tier and
# an effort. sol = frontier, terra = workhorse, luna = small/cheap. Verify every
# slug with `codex debug models` (doctor's `models` row enforces this at runtime,
# and `codex-delegate refresh-models` proposes updates from the live catalog).
#
# `efforts` lists each model's catalog reasoning levels so the loader can reject
# an impossible (model, effort) pair at LOAD time instead of burning the fallback
# ladder mid-run. Design rule: never minimize BOTH the model size and the effort
# on the same class — a small model at minimal effort is where reliability quietly
# drops on exactly the work you wanted cheap-but-correct.
#
# Requires Codex CLI >= 0.144.1 (older CLIs do not expose the 5.6 line and will
# make doctor's `cli-version` row warn). The 5.6 slugs were confirmed runnable on
# a ChatGPT-auth account on 2026-07-10.
[models."gpt-5.6-sol"]
tier = "flagship"
efforts = ["low", "medium", "high", "xhigh", "max", "ultra"]
[models."gpt-5.6-terra"]
tier = "general"
efforts = ["low", "medium", "high", "xhigh", "max", "ultra"]
[models."gpt-5.6-luna"]
tier = "fast"
efforts = ["low", "medium", "high", "xhigh", "max"]
[models."gpt-5.5"]
tier = "general"     # availability fallback only
efforts = ["low", "medium", "high", "xhigh"]
[models."gpt-5.4"]
tier = "general"     # availability fallback only
efforts = ["low", "medium", "high", "xhigh"]
[models."gpt-5.4-mini"]
tier = "fast"        # availability fallback only
efforts = ["low", "medium", "high", "xhigh"]

[classes.mechanical]     # simple, mechanical edits — small model, NOT minimal effort
model = "gpt-5.6-luna"
effort = "medium"
fallback = ["gpt-5.4-mini", "gpt-5.4"]
timeout = "10m"

[classes.implementation] # features / guided refactors — the workhorse (default)
model = "gpt-5.6-terra"
effort = "medium"
fallback = ["gpt-5.5", "gpt-5.4"]
timeout = "30m"

[classes.hard]           # tough bugs / heavy reasoning — frontier model
model = "gpt-5.6-sol"
effort = "high"
fallback = ["gpt-5.6-terra", "gpt-5.5"]
timeout = "45m"

[review.code-review]     # routine diffs: terra (cost-aware); raise to sol when critical
model = "gpt-5.6-terra"
effort = "high"
fallback = ["gpt-5.5"]
timeout = "20m"

[review.audit]           # whole-area security / quality sweep
model = "gpt-5.6-sol"
effort = "xhigh"
fallback = ["gpt-5.6-terra"]
timeout = "30m"

[review.plan-review]     # second-opinion a plan/spec BEFORE executing it
model = "gpt-5.6-sol"
effort = "high"
fallback = ["gpt-5.6-terra"]
timeout = "20m"

[default]
class = "implementation"

[limits]
maxAttemptsPerTask = 4
