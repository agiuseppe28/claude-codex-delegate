# model-policy.toml — single source of truth for "which model, how much effort".
#
# Copy this file to `.codex-delegate.local/model-policy.toml` in your repo and
# edit the copy — the shipped template is the fallback used when no local
# override exists.
#
# Flagship-first policy: ONE model, effort is the lever (low/medium/high).
# Update the flagship id below when OpenAI ships a newer flagship. Avoid `-pro`
# variants (cost) and older/smaller models (no real advantage; many support only
# `medium` effort anyway). A different model appears only as a rare fallback.
# Future: the 5.6 "sol/terra/luna" line will need a different strategy — revisit
# when it is public.
#
# IMPORTANT — every id here must be one the active Codex account can actually
# run. On a ChatGPT-auth account, `codex exec -m <id>` rejects unavailable ids
# with "model is not supported when using Codex with a ChatGPT account"; the
# fallback ladder then burns all its attempts on that error and hands back with
# no work done. The `-codex` suffixed ids (e.g. gpt-5.3-codex) are NOT offered
# to ChatGPT accounts — use the plain flagship (gpt-5.5) and a supported sibling
# (gpt-5.4) instead. Check `codex exec -m <id>` once before adding a new id.
[models."gpt-5.5"]
tier = "flagship"
[models."gpt-5.4"]   # rare fallback only: used if the flagship is unavailable
tier = "general"

[classes.mechanical]     # simple, mechanical edits — low effort (fast, cheap)
model = "gpt-5.5"
effort = "low"
fallback = ["gpt-5.4"]
timeout = "10m"

[classes.implementation] # features / guided refactors — medium effort
model = "gpt-5.5"
effort = "medium"
fallback = ["gpt-5.4"]
timeout = "30m"

[classes.hard]           # tough bugs / heavy reasoning — high effort
model = "gpt-5.5"
effort = "high"
fallback = ["gpt-5.4"]
timeout = "45m"

[default]
class = "implementation"

[limits]
maxAttemptsPerTask = 4
